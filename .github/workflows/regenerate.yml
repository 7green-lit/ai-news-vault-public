name: Regenerate HTML on source edit

on:
  push:
    paths:
      - 'source/**'
      - 'daily/**.md'
      - 'scripts/**'
      - '.github/workflows/regenerate.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: regenerate-html
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # トークン: regenerate コミットの push に必要
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate topics-overview HTML
        env:
          # generate_topics_overview_html.py が source/topics/ を見つける用
          TOPICS_SOURCE_DIR: ${{ github.workspace }}/source/topics
        run: python scripts/generate_topics_overview_html.py

      - name: Regenerate archive HTML
        run: python scripts/generate_archive_html.py

      - name: Commit + push (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html archive.html || true
          if git diff --cached --quiet; then
            echo "No HTML changes to commit"
            exit 0
          fi
          git commit -m "auto(actions): regenerate HTML from source edits"
          git push
